name: Bug report
description: Report a bug in ItemMagnet
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug!
  - type: input
    id: paper-version
    attributes:
      label: Paper version
      placeholder: e.g. 26.1.2 build 69
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: ItemMagnet version
      placeholder: e.g. 1.2.1
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config snippet
      description: Paste Lands/WorldGuard/tier settings if relevant
  - type: textarea
    id: logs
    attributes:
      label: Console errors
      render: shell
